<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Page Not Found - Westcore Links</title>
    <script>
        // Apply theme immediately to prevent flash
        (function() {
            // Migrate old theme key
            const oldTheme = localStorage.getItem('theme');
            if (oldTheme && !localStorage.getItem('westcore-theme')) {
                localStorage.setItem('westcore-theme', oldTheme);
                localStorage.removeItem('theme');
            }
            const theme = localStorage.getItem('westcore-theme') || (window.matchMedia && window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light');
            document.documentElement.setAttribute('data-theme', theme);
        })();
    </script>
    <link rel="stylesheet" href="/css/main.css">
</head>
<body>
    <header>
        <nav>
            <div class="nav-container">
                <div class="logo">
                    <h1>Westcore Links</h1>
                </div>
                <ul class="nav-menu">
                    <li><a href="/">Home</a></li>
                    <li><a href="/about">About</a></li>
                    <li><a href="/services">Services</a></li>
                    <li><a href="/gallery">Gallery</a></li>
                    <li><a href="/contact">Contact</a></li>
                </ul>
            </div>
        </nav>
    </header>

    <main>
        <section class="error-page">
            <h1>404 - Page Not Found</h1>
            <p>The page you're looking for doesn't exist.</p>
            <a href="/" class="btn-primary">Go Home</a>
        </section>
    </main>

    <footer>
        <div class="footer-content">
            <p>&copy; 2025 Westcore Links. All rights reserved.</p>
        </div>
    </footer>

    <script src="/js/theme.js"></script>
</body>
</html>
